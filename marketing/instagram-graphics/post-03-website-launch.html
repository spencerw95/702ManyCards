<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>702ManyCards - Website Launch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  margin: 0;
  overflow: hidden;
  background: #0D0F1A;
  font-family: 'Inter', sans-serif;
  position: relative;
}

/* Neon border */
.neon-border {
  position: absolute;
  top: 20px; left: 20px; right: 20px; bottom: 20px;
  border: 3px solid #00BCD4;
  border-radius: 12px;
  box-shadow:
    0 0 15px rgba(0,188,212,0.5),
    0 0 30px rgba(0,188,212,0.3),
    inset 0 0 15px rgba(0,188,212,0.1);
  animation: borderGlow 3s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes borderGlow {
  from { box-shadow: 0 0 15px rgba(0,188,212,0.5), 0 0 30px rgba(0,188,212,0.3), inset 0 0 15px rgba(0,188,212,0.1); }
  to { box-shadow: 0 0 25px rgba(0,188,212,0.8), 0 0 50px rgba(0,188,212,0.4), inset 0 0 25px rgba(0,188,212,0.15); }
}

/* Card suit decorations */
.suit {
  position: absolute;
  font-size: 60px;
  opacity: 0.08;
  color: #D4A843;
  z-index: 0;
}
.suit:nth-child(2) { top: 80px; left: 80px; }
.suit:nth-child(3) { top: 80px; right: 80px; }
.suit:nth-child(4) { bottom: 120px; left: 80px; }
.suit:nth-child(5) { bottom: 120px; right: 80px; }
.suit:nth-child(6) { top: 300px; left: 50px; font-size: 40px; }
.suit:nth-child(7) { top: 350px; right: 50px; font-size: 40px; }
.suit:nth-child(8) { bottom: 300px; left: 60px; font-size: 45px; }
.suit:nth-child(9) { bottom: 350px; right: 55px; font-size: 45px; }

/* Confetti dots */
.dot {
  position: absolute;
  border-radius: 50%;
  z-index: 0;
  animation: twinkle 2s ease-in-out infinite;
}
.dot:nth-child(10) { width: 6px; height: 6px; background: #00BCD4; top: 150px; left: 200px; animation-delay: 0s; }
.dot:nth-child(11) { width: 4px; height: 4px; background: #D4A843; top: 250px; left: 350px; animation-delay: 0.3s; }
.dot:nth-child(12) { width: 5px; height: 5px; background: #FFD700; top: 180px; right: 250px; animation-delay: 0.6s; }
.dot:nth-child(13) { width: 4px; height: 4px; background: #00BCD4; top: 400px; left: 120px; animation-delay: 0.9s; }
.dot:nth-child(14) { width: 6px; height: 6px; background: #D4A843; bottom: 250px; right: 180px; animation-delay: 1.2s; }
.dot:nth-child(15) { width: 3px; height: 3px; background: #FFD700; top: 500px; right: 100px; animation-delay: 0.4s; }
.dot:nth-child(16) { width: 5px; height: 5px; background: #00BCD4; bottom: 350px; left: 250px; animation-delay: 0.7s; }
.dot:nth-child(17) { width: 4px; height: 4px; background: #D4A843; top: 600px; left: 450px; animation-delay: 1s; }
.dot:nth-child(18) { width: 6px; height: 6px; background: #FFD700; bottom: 200px; left: 500px; animation-delay: 0.2s; }
.dot:nth-child(19) { width: 3px; height: 3px; background: #00BCD4; top: 300px; right: 400px; animation-delay: 1.5s; }

@keyframes twinkle {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.5); }
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px;
}

.logo {
  width: 280px;
  height: auto;
  margin-bottom: 40px;
}

.now-live {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 180px;
  color: #FFFFFF;
  text-align: center;
  line-height: 0.9;
  text-shadow:
    0 0 30px rgba(0,188,212,1),
    0 0 60px rgba(0,188,212,0.7),
    0 0 100px rgba(0,188,212,0.4),
    0 0 150px rgba(0,188,212,0.2);
  animation: neonPulse 2s ease-in-out infinite alternate;
}

@keyframes neonPulse {
  from { text-shadow: 0 0 30px rgba(0,188,212,1), 0 0 60px rgba(0,188,212,0.7), 0 0 100px rgba(0,188,212,0.4); }
  to { text-shadow: 0 0 40px rgba(0,188,212,1), 0 0 80px rgba(0,188,212,0.8), 0 0 120px rgba(0,188,212,0.5), 0 0 180px rgba(0,188,212,0.3); }
}

.game-list {
  font-family: 'Inter', sans-serif;
  font-size: 36px;
  color: #D4A843;
  text-align: center;
  font-weight: 700;
  letter-spacing: 6px;
  margin-top: 30px;
}

.game-list span {
  color: rgba(240,242,250,0.4);
  margin: 0 8px;
}

.url {
  font-family: 'Inter', sans-serif;
  font-size: 38px;
  color: #F0F2FA;
  text-align: center;
  font-weight: 700;
  letter-spacing: 4px;
  margin-top: 40px;
  padding: 15px 40px;
  border: 2px solid rgba(0,188,212,0.4);
  border-radius: 8px;
  background: rgba(0,188,212,0.05);
}
</style>
</head>

  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>

  <div class="container">
    <img src="../../public/logo.png" alt="702ManyCards" class="logo">
    <div class="now-live">NOW<br>LIVE</div>
    <div class="game-list">YU-GI-OH! <span>|</span> POKEMON <span>|</span> MTG</div>

</body>
</html>
