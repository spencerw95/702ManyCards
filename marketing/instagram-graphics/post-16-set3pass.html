<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Post 16 — POV: Your Opponent Sets 3 and Passes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@700&family=Bangers&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0D0F1A;
    font-family: 'Inter', sans-serif;
    color: #F0F2FA;
    overflow: hidden;
    position: relative;
  }

  /* Dramatic red glow behind cards area */
  .danger-glow {
    position: absolute;
    top: 300px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 350px;
    background: radial-gradient(ellipse, rgba(255, 40, 40, 0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Top label */
  .pov-label {
    position: absolute;
    top: 50px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Bangers', cursive;
    font-size: 62px;
    color: #F0F2FA;
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(255, 40, 40, 0.5), 0 4px 8px rgba(0,0,0,0.8);
    line-height: 1.15;
    padding: 0 60px;
  }

  /* Opponent side label */
  .opponent-label {
    position: absolute;
    top: 220px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    color: #ff4444;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* Three face-down cards */
  .cards-row {
    position: absolute;
    top: 280px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
  }

  .facedown-card {
    width: 180px;
    height: 260px;
    border-radius: 12px;
    background: linear-gradient(145deg, #1a1040 0%, #0a0620 50%, #1a1040 100%);
    border: 3px solid #3a2a6a;
    position: relative;
    box-shadow: 0 0 40px rgba(100, 40, 180, 0.3), 0 10px 30px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .facedown-card::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 2px solid #4a3a7a;
    border-radius: 6px;
  }

  .facedown-card::after {
    content: '?';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bangers', cursive;
    font-size: 80px;
    color: rgba(255, 40, 40, 0.4);
    text-shadow: 0 0 20px rgba(255, 40, 40, 0.3);
  }

  .facedown-card:nth-child(2) {
    transform: translateY(-15px);
  }

  /* Suspicion text */
  .suspicion {
    position: absolute;
    top: 580px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: #D4A843;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    letter-spacing: 1px;
  }

  .suspicion span {
    color: #ff6666;
  }

  /* Sweating face */
  .sweat-face {
    position: absolute;
    bottom: 220px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(180deg, #FFD93D, #F0C020);
    position: relative;
  }

  .face-container {
    position: absolute;
    bottom: 200px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
  }

  .face-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(180deg, #FFD93D, #F0C020);
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  /* Eyes - worried */
  .eye {
    position: absolute;
    width: 18px;
    height: 24px;
    background: #333;
    border-radius: 50%;
    top: 40px;
  }
  .eye.left { left: 32px; }
  .eye.right { right: 32px; }

  /* Eyebrows - worried */
  .eyebrow {
    position: absolute;
    width: 24px;
    height: 4px;
    background: #665500;
    top: 30px;
    border-radius: 2px;
  }
  .eyebrow.left { left: 28px; transform: rotate(15deg); }
  .eyebrow.right { right: 28px; transform: rotate(-15deg); }

  /* Mouth - grimace */
  .mouth {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 18px;
    border-bottom: 4px solid #333;
    border-radius: 0 0 20px 20px;
  }

  /* Sweat drop */
  .sweat {
    position: absolute;
    top: 20px;
    right: 8px;
    width: 12px;
    height: 18px;
    background: #87CEEB;
    border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
  }

  /* Bottom text */
  .bottom-text {
    position: absolute;
    bottom: 130px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Bangers', cursive;
    font-size: 36px;
    color: #F0F2FA;
    opacity: 0.6;
    letter-spacing: 2px;
  }

  /* Duel field lines */
  .field-line {
    position: absolute;
    top: 260px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  .field-line.bottom {
    top: 560px;
  }

  /* Logo */
  .logo {
    position: absolute;
    bottom: 30px;
    right: 40px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: #F0F2FA;
    opacity: 0.4;
    letter-spacing: 2px;
  }

  .logo span {
    color: #00BCD4;
  }

  /* Edison badge */
  .edison-badge {
    position: absolute;
    bottom: 30px;
    left: 40px;
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    color: #D4A843;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.5;
    border: 1px solid rgba(212, 168, 67, 0.3);
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* Vignette */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="danger-glow"></div>
  <div class="field-line"></div>
  <div class="field-line bottom"></div>

  <div class="pov-label">POV: YOUR OPPONENT<br>SETS 3 AND PASSES</div>

  <div class="opponent-label">OPPONENT'S FIELD</div>

  <div class="cards-row">
    <div class="facedown-card"></div>
    <div class="facedown-card"></div>
    <div class="facedown-card"></div>
  </div>

  <div class="suspicion">Ryko? &nbsp; Snowman Eater? &nbsp; <span>Bottomless?</span> &nbsp; <span>Torrential??</span></div>

  <div class="face-container">
    <div class="face-circle">
      <div class="eyebrow left"></div>
      <div class="eyebrow right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
      <div class="sweat"></div>
    </div>
  </div>

  <div class="bottom-text">WELCOME TO EDISON FORMAT</div>

  <div class="edison-badge">Edison Format</div>
  <div class="logo"><span>702</span>ManyCards</div>
  <div class="vignette"></div>

</body>
</html>
