<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>702ManyCards - Build Your Edison Deck</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  margin: 0;
  overflow: hidden;
  background: #0D0F1A;
  font-family: 'Inter', sans-serif;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(212,168,67,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,67,0.04) 1px, transparent 1px);
  background-size: 54px 54px;
  z-index: 0;
}

body::after {
  content: '';
  position: absolute;
  top: 30%; left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 600px;
  background: radial-gradient(ellipse, rgba(0,188,212,0.06) 0%, transparent 60%);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 60px;
}

.logo {
  width: 170px;
  height: auto;
  margin-bottom: 16px;
}

.edison-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(212,168,67,0.08));
  border: 1.5px solid rgba(212,168,67,0.5);
  border-radius: 8px;
  padding: 8px 24px;
  margin-bottom: 20px;
}

.edison-badge span {
  font-family: 'Oswald', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: #D4A843;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.badge-dot {
  width: 8px;
  height: 8px;
  background: #D4A843;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(212,168,67,0.6);
}

.main-title {
  font-family: 'Oswald', sans-serif;
  font-size: 76px;
  font-weight: 700;
  color: #F0F2FA;
  text-align: center;
  line-height: 1;
  text-transform: uppercase;
  margin-bottom: 4px;
  text-shadow: 0 0 30px rgba(0,188,212,0.3);
}

.main-subtitle {
  font-family: 'Oswald', sans-serif;
  font-size: 44px;
  font-weight: 500;
  color: #00BCD4;
  letter-spacing: 5px;
  text-transform: uppercase;
  margin-bottom: 28px;
  text-shadow: 0 0 15px rgba(0,188,212,0.4);
}

.divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #D4A843, transparent);
  margin-bottom: 28px;
}

/* Deck checklist */
.checklist {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 30px;
  max-width: 800px;
  margin-bottom: 30px;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: linear-gradient(135deg, rgba(212,168,67,0.08), rgba(212,168,67,0.02));
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 8px;
  transition: all 0.3s;
}

.check-box {
  width: 28px;
  height: 28px;
  border: 2px solid rgba(212,168,67,0.5);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.check-box.checked {
  background: rgba(0,188,212,0.2);
  border-color: #00BCD4;
}

.check-box.checked::after {
  content: '\2713';
  color: #00BCD4;
  font-size: 18px;
  font-weight: 700;
}

.check-label {
  font-family: 'Inter', sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: #D4A843;
  letter-spacing: 0.5px;
}

.check-item.active .check-label {
  color: #00BCD4;
}

.step-text {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  color: rgba(240,242,250,0.5);
  text-align: center;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 10px;
  max-width: 700px;
}

.step-text strong {
  color: #00BCD4;
  font-weight: 700;
}

.cta-text {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  color: rgba(240,242,250,0.6);
  text-align: center;
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: auto;
  margin-bottom: 6px;
}

.bottom-url {
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  color: rgba(240,242,250,0.5);
  letter-spacing: 3px;
  font-weight: 600;
  margin-bottom: 10px;
}

/* Synchro ring decorations */
.synchro-ring {
  position: absolute;
  border: 1.5px solid rgba(212,168,67,0.08);
  border-radius: 50%;
  z-index: 0;
}
.synchro-ring:nth-of-type(1) { width: 350px; height: 350px; top: -100px; left: -100px; }
.synchro-ring:nth-of-type(2) { width: 250px; height: 250px; bottom: -80px; right: -60px; }
</style>
</head>
<body>
  <div class="synchro-ring"></div>
  <div class="synchro-ring"></div>

  <div class="container">
    <img src="../../public/logo.png" alt="702ManyCards" class="logo">

    <div class="edison-badge">
      <div class="badge-dot"></div>
      <span>Edison Format</span>
      <div class="badge-dot"></div>
    </div>

    <div class="main-title">Build Your</div>
    <div class="main-subtitle">Edison Deck</div>
    <div class="divider"></div>

    <div class="checklist">
      <div class="check-item active">
        <div class="check-box checked"></div>
        <div class="check-label" style="color:#00BCD4;">Lightsworn</div>
      </div>
      <div class="check-item">
        <div class="check-box"></div>
        <div class="check-label">Gladiator Beasts</div>
      </div>
      <div class="check-item active">
        <div class="check-box checked"></div>
        <div class="check-label" style="color:#00BCD4;">Blackwings</div>
      </div>
      <div class="check-item">
        <div class="check-box"></div>
        <div class="check-label">Quickdraw Synchron</div>
      </div>
      <div class="check-item">
        <div class="check-box"></div>
        <div class="check-label">Monarchs</div>
      </div>
      <div class="check-item active">
        <div class="check-box checked"></div>
        <div class="check-label" style="color:#00BCD4;">Zombies</div>
      </div>
      <div class="check-item">
        <div class="check-box"></div>
        <div class="check-label">X-Sabers</div>
      </div>
      <div class="check-item">
        <div class="check-box"></div>
        <div class="check-label">Anti-Meta</div>
      </div>
    </div>

    <div class="step-text">
      Pick your deck. Find the singles. <strong>We ship it.</strong>
    </div>

    <div class="cta-text">Shop Edison singles at</div>
    <div class="bottom-url">702manycards.com</div>
  </div>
</body>
</html>
