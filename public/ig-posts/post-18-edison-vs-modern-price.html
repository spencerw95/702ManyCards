<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<title>Post 18 — Edison Staples vs Modern YuGiOh Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@700&family=Bangers&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #0D0F1A;
    font-family: 'Inter', sans-serif;
    color: #F0F2FA;
    overflow: hidden;
    position: relative;
  }

  /* Header */
  .header {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Bangers', cursive;
    font-size: 46px;
    color: #F0F2FA;
    letter-spacing: 2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
  }

  /* Two halves */
  .left-half {
    position: absolute;
    top: 140px;
    left: 0;
    width: 540px;
    bottom: 100px;
    background: linear-gradient(180deg, rgba(76, 175, 80, 0.08) 0%, rgba(76, 175, 80, 0.02) 100%);
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .right-half {
    position: absolute;
    top: 140px;
    right: 0;
    width: 540px;
    bottom: 100px;
    background: linear-gradient(180deg, rgba(244, 67, 54, 0.08) 0%, rgba(244, 67, 54, 0.02) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 35px;
    text-align: center;
    line-height: 1.3;
  }

  .left-half .section-label { color: #4CAF50; }
  .right-half .section-label { color: #f44336; }

  /* Happy face */
  .face-happy {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(180deg, #FFD93D, #F0C020);
    position: relative;
    margin-bottom: 35px;
    box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
  }

  .face-happy .eye {
    position: absolute;
    width: 8px;
    height: 3px;
    background: #333;
    border-radius: 0;
    top: 50px;
    border-top: 4px solid #333;
    border-radius: 50% 50% 0 0;
    width: 22px;
    height: 11px;
    background: transparent;
    border-bottom: none;
  }
  .face-happy .eye.left { left: 30px; }
  .face-happy .eye.right { right: 30px; }

  .face-happy .mouth {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 25px;
    border-bottom: 5px solid #333;
    border-left: 5px solid #333;
    border-right: 5px solid #333;
    border-radius: 0 0 30px 30px;
    background: transparent;
  }

  /* Sunglasses */
  .sunglasses {
    position: absolute;
    top: 38px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 32px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .lens {
    width: 42px;
    height: 28px;
    background: #111;
    border-radius: 6px;
    border: 2px solid #333;
  }

  .bridge {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 12px;
    height: 3px;
    background: #333;
  }

  /* Sad face */
  .face-sad {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: linear-gradient(180deg, #FFD93D, #F0C020);
    position: relative;
    margin-bottom: 35px;
    box-shadow: 0 0 30px rgba(244, 67, 54, 0.3);
  }

  .face-sad .eye {
    position: absolute;
    width: 26px;
    height: 26px;
    top: 40px;
    font-size: 28px;
    font-weight: 900;
    color: #333;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face-sad .eye.left { left: 28px; }
  .face-sad .eye.right { right: 28px; }

  .face-sad .mouth {
    position: absolute;
    bottom: 35px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 20px;
    border-top: 4px solid #333;
    border-radius: 50% 50% 0 0;
  }

  /* Tear */
  .tear {
    position: absolute;
    top: 65px;
    width: 10px;
    height: 16px;
    background: #87CEEB;
    border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
  }
  .tear.left { left: 38px; }
  .tear.right { right: 38px; }

  /* Price display */
  .price {
    font-family: 'Bangers', cursive;
    font-size: 82px;
    margin-bottom: 15px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  .left-half .price { color: #4CAF50; }
  .right-half .price { color: #f44336; }

  .price-desc {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    line-height: 1.5;
    opacity: 0.8;
  }

  /* Wallet icons */
  .wallet {
    font-size: 52px;
    margin-bottom: 20px;
  }

  /* Wallet on fire */
  .fire-wallet {
    position: relative;
    font-size: 52px;
    margin-bottom: 20px;
  }

  .fire {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 30px;
    background: radial-gradient(ellipse at bottom, #ff6600 0%, #ff3300 40%, transparent 70%);
    border-radius: 50% 50% 20% 20%;
    opacity: 0.8;
  }

  /* VS divider */
  .vs-divider {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bangers', cursive;
    font-size: 38px;
    color: #D4A843;
    background: #0D0F1A;
    padding: 12px 18px;
    border-radius: 50%;
    border: 3px solid #D4A843;
    z-index: 10;
    box-shadow: 0 0 20px rgba(212, 168, 67, 0.3);
  }

  /* Center line */
  .center-line {
    position: absolute;
    top: 140px;
    left: 50%;
    width: 2px;
    bottom: 100px;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.1) 20%, rgba(255,255,255,0.1) 80%, transparent);
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 100px;
    background: rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .bottom-text {
    font-family: 'Bangers', cursive;
    font-size: 32px;
    color: #00BCD4;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0, 188, 212, 0.3);
  }

  /* Logo */
  .logo {
    position: absolute;
    bottom: 30px;
    right: 40px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: #F0F2FA;
    opacity: 0.4;
    letter-spacing: 2px;
    z-index: 5;
  }
  .logo span { color: #00BCD4; }
</style>
</head>
<body>

  <div class="header">BUILDING EDISON vs BUYING MODERN</div>

  <div class="left-half">
    <div class="section-label">BUILDING AN ENTIRE<br>EDISON DECK</div>
    <div class="face-happy">
      <div class="sunglasses">
        <div class="lens"></div>
        <div class="lens"></div>
        <div class="bridge"></div>
      </div>
      <div class="mouth"></div>
    </div>
    <div class="wallet">&#x1F4B0;</div>
    <div class="price">$50-100</div>
    <div class="price-desc">Full competitive deck<br>Ready to win tournaments</div>
  </div>

  <div class="right-half">
    <div class="section-label">BUYING ONE MODERN<br>YUGIOH CARD</div>
    <div class="face-sad">
      <div class="eye left">X</div>
      <div class="eye right">X</div>
      <div class="mouth"></div>
      <div class="tear left"></div>
      <div class="tear right"></div>
    </div>
    <div class="fire-wallet">
      &#x1F4B8;
      <div class="fire"></div>
    </div>
    <div class="price">$500+</div>
    <div class="price-desc">And it gets banned<br>next format anyway</div>
  </div>

  <div class="center-line"></div>
  <div class="vs-divider">VS</div>

  <div class="bottom-bar">
    <div class="bottom-text">EDISON: WHERE YOUR WALLET IS SAFE</div>
  </div>

  <div class="logo"><span>702</span>ManyCards</div>

</body>
</html>
