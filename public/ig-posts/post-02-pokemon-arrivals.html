<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>702ManyCards - Pokemon Arrivals</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  margin: 0;
  overflow: hidden;
  background: #0D0F1A;
  font-family: 'Inter', sans-serif;
  position: relative;
}

/* Electric bolt patterns */
.bolt {
  position: absolute;
  width: 4px;
  background: linear-gradient(to bottom, #FFD700, rgba(255,215,0,0));
  opacity: 0.3;
  z-index: 0;
}
.bolt:nth-child(1) { height: 300px; top: 0; left: 150px; transform: rotate(5deg); }
.bolt:nth-child(2) { height: 250px; top: 0; left: 400px; transform: rotate(-3deg); }
.bolt:nth-child(3) { height: 350px; top: 0; right: 200px; transform: rotate(8deg); }
.bolt:nth-child(4) { height: 280px; bottom: 0; left: 300px; transform: rotate(-6deg); }
.bolt:nth-child(5) { height: 320px; bottom: 0; right: 350px; transform: rotate(4deg); }
.bolt:nth-child(6) { height: 200px; bottom: 0; right: 120px; transform: rotate(-2deg); }

/* Electric energy circles */
.energy-ring {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(255,215,0,0.1);
  z-index: 0;
}
.energy-ring:nth-child(7) { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%,-50%); }
.energy-ring:nth-child(8) { width: 450px; height: 450px; top: 50%; left: 50%; transform: translate(-50%,-50%); border-color: rgba(0,188,212,0.1); }
.energy-ring:nth-child(9) { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%,-50%); }

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

.logo {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: auto;
}

.lightning-icon {
  font-size: 80px;
  margin-bottom: 10px;
  animation: zap 1.5s ease-in-out infinite alternate;
}

@keyframes zap {
  0% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
  100% { opacity: 0.7; transform: scale(1); }
}

.main-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 110px;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.05;
  text-shadow:
    0 0 20px rgba(255,215,0,0.6),
    0 0 40px rgba(255,215,0,0.3);
  margin-bottom: 20px;
}

.main-text span {
  color: #FFD700;
  text-shadow:
    0 0 20px rgba(255,215,0,0.8),
    0 0 40px rgba(255,215,0,0.5),
    0 0 80px rgba(255,215,0,0.3);
}

.sub-text {
  font-family: 'Inter', sans-serif;
  font-size: 36px;
  color: #00BCD4;
  text-align: center;
  font-weight: 700;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 15px;
}

.divider {
  width: 300px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #FFD700, #00BCD4, transparent);
  margin: 25px 0;
}

.bottom-url {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  color: rgba(240,242,250,0.6);
  letter-spacing: 3px;
  font-weight: 600;
}
</style>
</head>
<body>
  <div class="bolt"></div>
  <div class="bolt"></div>
  <div class="bolt"></div>
  <div class="bolt"></div>
  <div class="bolt"></div>
  <div class="bolt"></div>
  <div class="energy-ring"></div>
  <div class="energy-ring"></div>
  <div class="energy-ring"></div>

  <div class="container">
    <img src="../../public/logo.png" alt="702ManyCards" class="logo">

    <div class="lightning-icon">&#9889;</div>
    <div class="main-text">NEW<br><span>POKEMON</span><br>SINGLES</div>
    <div class="divider"></div>
    <div class="sub-text">Shop Now Online</div>
  </div>

  <div class="bottom-url">702manycards.com</div>
</body>
</html>
