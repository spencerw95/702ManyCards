<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>702ManyCards - What's Your Edison Deck?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  margin: 0;
  overflow: hidden;
  background: #0D0F1A;
  font-family: 'Inter', sans-serif;
  position: relative;
}

body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(212,168,67,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,168,67,0.04) 1px, transparent 1px);
  background-size: 54px 54px;
  z-index: 0;
}

/* Central warm glow */
body::after {
  content: '';
  position: absolute;
  top: 45%; left: 50%;
  transform: translate(-50%, -50%);
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(212,168,67,0.1) 0%, rgba(212,168,67,0.03) 40%, transparent 65%);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 60px;
}

.logo {
  width: 170px;
  height: auto;
  margin-bottom: 16px;
}

.edison-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(212,168,67,0.08));
  border: 1.5px solid rgba(212,168,67,0.5);
  border-radius: 8px;
  padding: 8px 24px;
  margin-bottom: 22px;
}

.edison-badge span {
  font-family: 'Oswald', sans-serif;
  font-size: 20px;
  font-weight: 600;
  color: #D4A843;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.badge-dot {
  width: 8px;
  height: 8px;
  background: #D4A843;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(212,168,67,0.6);
}

.question-mark {
  font-family: 'Oswald', sans-serif;
  font-size: 60px;
  font-weight: 700;
  color: rgba(212,168,67,0.15);
  position: absolute;
  z-index: 0;
}
.question-mark:nth-of-type(1) { top: 100px; left: 70px; transform: rotate(-15deg); }
.question-mark:nth-of-type(2) { top: 120px; right: 80px; transform: rotate(12deg); }
.question-mark:nth-of-type(3) { bottom: 180px; left: 50px; transform: rotate(8deg); font-size: 45px; }
.question-mark:nth-of-type(4) { bottom: 200px; right: 60px; transform: rotate(-20deg); font-size: 50px; }

.main-title {
  font-family: 'Oswald', sans-serif;
  font-size: 72px;
  font-weight: 700;
  color: #F0F2FA;
  text-align: center;
  line-height: 1;
  text-transform: uppercase;
  margin-bottom: 4px;
  text-shadow: 0 0 25px rgba(0,188,212,0.3);
}

.main-subtitle {
  font-family: 'Oswald', sans-serif;
  font-size: 50px;
  font-weight: 500;
  color: #D4A843;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 30px;
  text-shadow: 0 0 20px rgba(212,168,67,0.4);
}

.divider {
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #D4A843, transparent);
  margin-bottom: 28px;
}

/* Deck options grid */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  max-width: 860px;
  margin-bottom: 28px;
}

.option-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 22px 16px;
  border-radius: 12px;
  border: 1.5px solid;
  text-align: center;
  min-height: 100px;
}

.option-card:nth-child(1) {
  background: linear-gradient(135deg, rgba(212,168,67,0.15), rgba(212,168,67,0.04));
  border-color: rgba(212,168,67,0.4);
}
.option-card:nth-child(2) {
  background: linear-gradient(135deg, rgba(200,140,50,0.15), rgba(200,140,50,0.04));
  border-color: rgba(200,140,50,0.4);
}
.option-card:nth-child(3) {
  background: linear-gradient(135deg, rgba(0,188,212,0.12), rgba(0,188,212,0.03));
  border-color: rgba(0,188,212,0.35);
}
.option-card:nth-child(4) {
  background: linear-gradient(135deg, rgba(220,160,50,0.12), rgba(220,160,50,0.03));
  border-color: rgba(220,160,50,0.35);
}
.option-card:nth-child(5) {
  background: linear-gradient(135deg, rgba(180,60,60,0.12), rgba(180,60,60,0.03));
  border-color: rgba(180,60,60,0.3);
}
.option-card:nth-child(6) {
  background: linear-gradient(135deg, rgba(0,188,212,0.15), rgba(0,188,212,0.04));
  border-color: rgba(0,188,212,0.4);
}

.option-icon {
  font-size: 32px;
  margin-bottom: 8px;
}

.option-name {
  font-family: 'Oswald', sans-serif;
  font-size: 24px;
  font-weight: 600;
  color: #F0F2FA;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.engage-text {
  font-family: 'Inter', sans-serif;
  font-size: 24px;
  color: #00BCD4;
  text-align: center;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.engage-sub {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  color: rgba(240,242,250,0.5);
  text-align: center;
  font-weight: 500;
  margin-bottom: 10px;
}

.cta-text {
  font-family: 'Inter', sans-serif;
  font-size: 19px;
  color: rgba(240,242,250,0.5);
  text-align: center;
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: auto;
  margin-bottom: 6px;
}

.bottom-url {
  font-family: 'Inter', sans-serif;
  font-size: 28px;
  color: rgba(240,242,250,0.5);
  letter-spacing: 3px;
  font-weight: 600;
  margin-bottom: 10px;
}

/* Synchro rings */
.synchro-ring {
  position: absolute;
  border: 1.5px solid rgba(212,168,67,0.06);
  border-radius: 50%;
  z-index: 0;
}
.synchro-ring:nth-of-type(1) { width: 500px; height: 500px; top: -200px; right: -150px; }
.synchro-ring:nth-of-type(2) { width: 350px; height: 350px; bottom: -120px; left: -100px; }
</style>
</head>
<body>
  <div class="synchro-ring"></div>
  <div class="synchro-ring"></div>
  <div class="question-mark">?</div>
  <div class="question-mark">?</div>
  <div class="question-mark">?</div>
  <div class="question-mark">?</div>

  <div class="container">
    <img src="../../public/logo.png" alt="702ManyCards" class="logo">

    <div class="edison-badge">
      <div class="badge-dot"></div>
      <span>Edison Format</span>
      <div class="badge-dot"></div>
    </div>

    <div class="main-title">What's Your</div>
    <div class="main-subtitle">Edison Deck?</div>
    <div class="divider"></div>

    <div class="options-grid">
      <div class="option-card">
        <div class="option-icon">&#9728;</div>
        <div class="option-name">Lightsworn</div>
      </div>
      <div class="option-card">
        <div class="option-icon">&#9876;</div>
        <div class="option-name">Glad Beasts</div>
      </div>
      <div class="option-card">
        <div class="option-icon">&#9670;</div>
        <div class="option-name">Blackwings</div>
      </div>
      <div class="option-card">
        <div class="option-icon">&#9881;</div>
        <div class="option-name">Quickdraw</div>
      </div>
      <div class="option-card">
        <div class="option-icon">&#9813;</div>
        <div class="option-name">Monarchs</div>
      </div>
      <div class="option-card">
        <div class="option-icon">&#10067;</div>
        <div class="option-name">Other</div>
      </div>
    </div>

    <div class="engage-text">DROP YOUR DECK IN THE COMMENTS</div>
    <div class="engage-sub">Tag a friend who needs to play Edison</div>

    <div class="cta-text">Shop Edison singles at</div>
    <div class="bottom-url">702manycards.com</div>
  </div>
</body>
</html>
